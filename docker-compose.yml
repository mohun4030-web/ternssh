services:
  ternssh:
    build: .
    ports:
      - "${PORT:-8787}:${PORT:-8787}"
    environment:
      PORT: "${PORT:-8787}"
      BASICAUTH_USERNAME: "${BASICAUTH_USERNAME:-}"
      BASICAUTH_PASSWORD: "${BASICAUTH_PASSWORD:-}"
    volumes:
      - ternssh-data:/app/.wrangler
    restart: unless-stopped

volumes:
  ternssh-data:
